<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGAP RI · Sistem Informasi Gardu Analisis Presiden</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --red: #c8102e; --ink: #0c0c0c; --paper: #f3ede3; --line: #ccc5b5; --muted: #6b6355;
        --blue: #0d4a8c; --amber: #b87000; --green: #1a6b2e;
        --serif: 'Playfair Display', serif; --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    body { background: var(--paper); color: var(--ink); font-family: var(--sans); margin: 0; padding: 0; overflow-x: hidden; }
    .top-bar { height: 6px; background: linear-gradient(90deg, var(--red) 50% , #fff 50%); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--line); }
    
    header { padding: 20px 36px; border-bottom: 1px solid var(--line); background: #fff; display: flex; justify-content: space-between; align-items: center; }
    .brand-box { display: flex; align-items: center; gap: 12px; }
    .sigap-tag { background: var(--red); color: #fff; font-family: var(--mono); font-weight: 700; padding: 4px 12px; border-radius: 3px; letter-spacing: 1px; }
    .brand-title { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; }
    .h-meta { text-align: right; font-family: var(--mono); font-size: 11px; font-weight: 700; }
    
    .wrap { max-width: 1400px; margin: 0 auto; padding: 25px; }

    /* PANEL PROTOKOL SIMULASI */
    .info-panel { background: #e9e3d7; border-left: 5px solid var(--red); padding: 25px; margin-bottom: 35px; box-shadow: 5px 5px 0 rgba(0,0,0,0.05); }
    .info-title { font-family: var(--serif); font-size: 1.2rem; font-weight: 700; color: var(--red); display: block; margin-bottom: 15px; font-style: italic; }
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; font-size: 0.9rem; line-height: 1.6; }
    .info-grid strong { font-family: var(--mono); font-size: 0.75rem; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }

    /* AMANAT PRESIDEN */
    .hero-statement { background: #fff; border: 2px solid var(--ink); padding: 45px; margin-bottom: 30px; position: relative; box-shadow: 15px 15px 0 var(--line); }
    .label-top { position: absolute; top: -12px; left: 30px; background: var(--red); color: #fff; padding: 3px 15px; font-family: var(--mono); font-size: 10px; font-weight: 700; }
    .statement-text { font-family: var(--serif); font-size: clamp(1.4rem, 2.8vw, 2rem); font-style: italic; line-height: 1.4; margin: 0 0 25px 0; }
    
    /* MATRIKS EKSEKUTIF */
    .exec-matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; background: var(--ink); color: #fff; padding: 25px; font-family: var(--mono); margin-bottom: 40px; }
    .exec-item { border-left: 1px solid #444; padding-left: 20px; }
    .exec-item:first-child { border-left: none; padding-left: 0; }
    .exec-lbl { font-size: 8px; color: var(--line); text-transform: uppercase; margin-bottom: 8px; display: block; }
    .exec-val { font-size: 0.85rem; line-height: 1.5; color: #eee; }

    /* PILAR GRID */
    .sh { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin: 40px 0 20px; display: flex; align-items: center; gap: 10px; }
    .sh::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    
    .pgrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 50px; }
    .pc { background: #fff; border: 1px solid var(--line); padding: 18px; border-top-width: 5px; min-height: 160px; transition: transform 0.2s; }
    .pc:hover { transform: translateY(-5px); }
    .pc.stabil { border-top-color: var(--green); }
    .pc.waspada { border-top-color: var(--amber); }
    .pc.darurat { border-top-color: var(--red); }
    .pc-num { font-family: var(--mono); font-size: 8px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; color: var(--muted); margin-bottom: 10px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: block; }
    .s-stabil { background: var(--green); }
    .s-waspada { background: var(--amber); }
    .s-darurat { background: var(--red); }
    .pc-title { font-weight: 700; display: block; margin-bottom: 8px; font-family: var(--serif); font-style: italic; font-size: 1.1rem; }
    .pc-brief { font-size: 0.8rem; color: #444; line-height: 1.5; }

    /* LAPORAN KEBIJAKAN (POLICY BRIEF) */
    .policy-brief { background: #fff; border: 1px solid var(--line); padding: 50px; max-width: 1000px; margin: 0 auto 60px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
    .pb-header { text-align: center; border-bottom: 2px double var(--ink); padding-bottom: 25px; margin-bottom: 35px; }
    .pb-header h2 { font-family: var(--serif); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
    .pb-section { margin-bottom: 30px; }
    .pb-title { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; margin-bottom: 12px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .pb-content { font-size: 0.95rem; line-height: 1.8; text-align: justify; color: #333; }
    .pb-content ul { padding-left: 20px; }
    .pb-content li { margin-bottom: 12px; }

    footer { background: var(--ink); color: #fff; padding: 25px 36px; display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; }
    .btn-sync { background: var(--red); color: #fff; border: none; padding: 8px 16px; font-family: var(--mono); font-size: 10px; cursor: pointer; transition: 0.2s; border-radius: 2px; }
    .btn-sync:hover { filter: brightness(1.2); }

    @media (max-width: 1100px) { .pgrid { grid-template-columns: repeat(2, 1fr); } .exec-matrix, .info-grid { grid-template-columns: 1fr; gap: 15px; } .policy-brief { padding: 30px; } }
</style>
</head>
<body>

<div class="top-bar"></div>

<header>
    <div class="brand-box">
        <div class="sigap-tag">SIGAP</div>
        <div class="brand-title">RI <span style="font-weight: 400; font-size: 0.9rem; color: var(--muted); font-style: italic; margin-left: 10px;">— Sistem Informasi Gardu Analisis Presiden</span></div>
    </div>
    <div class="h-meta">
        <div id="real-time-clock">MEMUAT DATA WAKTU...</div>
        <button class="btn-sync" onclick="syncAll()">⟳ SINKRONISASI NASIONAL</button>
    </div>
</header>

<div class="wrap">

    <div class="info-panel">
        <span class="info-title">Dialektika Kebij
