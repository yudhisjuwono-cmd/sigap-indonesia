<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Room Presiden RI · Kebijakan Berlandaskan Konstitusi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#c8102e;--amber:#b87000;--green:#1a6b2e;--blue:#0d4a8c;
  --ink:#0c0c0c;--paper:#f3ede3;--cream:#e9e3d7;--line:#ccc5b5;--muted:#6b6355;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;margin:0}
.top-bar{height:6px;background:linear-gradient(90deg, var(--red) 50%, #fff 50%); position: sticky; top:0; z-index:100}

/* HEADER SECTION */
header{padding:20px 36px; border-bottom:1px solid var(--line); background:#fff; display:flex; justify-content:space-between; align-items:center}
.h-left h1{font-family:var(--serif); font-size:clamp(1.4rem, 3vw, 2rem); font-weight:700; margin:0}
.h-left h1 b{color:var(--red); font-style: italic;}
.h-meta{text-align:right; font-family:var(--mono); font-size:10px}
#real-time-clock { font-weight: 700; color: var(--ink); letter-spacing: 0.5px; }

/* REFRESH COMPONENT */
.btn-refresh{background:var(--ink); color:#fff; border:none; padding:10px 18px; font-family:var(--mono); font-size:9px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; margin-top:10px; transition:0.2s; font-weight: 700;}
.btn-refresh:hover{background:var(--red); transform: translateY(-1px);}
.btn-refresh:active{transform: translateY(0);}

.wrap{max-width:1400px; margin:0 auto; padding:20px 36px 80px}
.sh{font-family:var(--mono); font-size:8px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin:30px 0 15px; display:flex; align-items:center; gap:10px}
